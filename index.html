<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRANT St.A | Architectural System</title>
    <!-- Подключаем библиотеку панорам -->
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="panorama"></div>

    <script>
        // Инициализация первой панорамы
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "hall_1.jpg", // Сюда мы впишем имя твоего первого рендера
            "autoLoad": true,
            "showControls": false // Убираем лишние кнопки, чтобы было чище
        });
    </script>
</body>
</html>
