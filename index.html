<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRANT St.A | Presentation</title>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // ТВОЙ КОНФИГ ИЗ FIREBASE
        const firebaseConfig = { 
            // Вставь сюда свой блок кода из Firebase (apiKey, authDomain и т.д.)
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Инициализация плеера
        const viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "initial_scene.jpg", // Смени на название своей первой панорамы
            "autoLoad": true
        });

        // Слушаем команды с пульта
        onValue(ref(db, 'currentScene'), (snapshot) => {
            const sceneId = snapshot.val();
            if(sceneId) {
                console.log("Смена сцены на: " + sceneId);
                // Здесь будет логика загрузки твоего видео/панорамы
                viewer.addHotspot({"pitch": 0, "yaw": 0, "type": "info", "text": "Переход: " + sceneId});
            }
        });
    </script>
</head>
<body>
    <div id="panorama" style="width:100%; height:100vh;"></div>
</body>
</html>
