<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRANT St.A | Presentation</title>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCx6DLX-bMYArTNIdg7Ek_ccuwHmUC_5zM",
        authDomain: "grant-st-a.firebaseapp.com",
        projectId: "grant-st-a",
        storageBucket: "grant-st-a.appspot.com",
        messagingSenderId: "79852777495",
        appId: "1:79852777495:web:ada5c57f7fe6dbc7b31452",
        measurementId: "G-CDLWTJVPY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Инициализация плеера с зацикливанием
    const viewer = pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": "entry_video.mp4",
        "autoLoad": true,
        "showControls": false,
        "loop": true 
    });

    // Слушаем пульт и переключаем сцены через добавление в память
    onValue(ref(db, 'currentScene'), (snapshot) => {
        const sceneId = snapshot.val();
        if(sceneId) {
            console.log("Переключение на: " + sceneId);
            
            // Добавляем сцену и сразу загружаем ее
            viewer.addScene(sceneId, {
                "type": "equirectangular",
                "panorama": sceneId + "_video.mp4",
                "autoLoad": true,
                "loop": true
            });
            viewer.loadScene(sceneId);
        }
    });
</script>

</body>
</html>
