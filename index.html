<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRANT St.A | Interactive Architectural System</title>
    <link rel="stylesheet" href="https://cdn.pannellum.org/2.5/pannellum.css"/>
    <script src="https://cdn.pannellum.org/2.5/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        /* Стили для кнопок управления */
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 10; }
        button { padding: 10px 20px; cursor: pointer; background: rgba(255,255,255,0.2); border: 1px solid #fff; color: white; }
    </style>
</head>
<body>

    <div id="panorama"></div>

    <div id="controls">
        <button onclick="changeScene('entry')">Вход</button>
        <button onclick="changeScene('transit')">Транзитная ось</button>
        <button onclick="changeScene('restaurant')">Ресторан</button>
    </div>

    <script>
        // Твоя база данных узлов (из схемы)
        const scenes = {
            "entry": {
                "video": "entry_video.mp4",
                "title": "Входная группа"
            },
            "transit": {
                "video": "transit_video.mp4",
                "title": "Транзитная ось"
            },
            "restaurant": {
                "video": "restaurant_video.mp4",
                "title": "Ресторан"
            }
        };

        // Инициализация движка
        let viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "initial_scene.jpg", // Твоя первая картинка
            "autoLoad": true,
            "showControls": false
        });

        // Функция смены сцены
        function changeScene(sceneId) {
            const scene = scenes[sceneId];
            if (scene) {
                viewer.addHotspot({
                    "pitch": 0,
                    "yaw": 0,
                    "type": "info",
                    "text": "Загрузка " + scene.title
                });
                console.log("Запускаем: " + scene.video);
                // Здесь будет логика подмены видео-потока
            }
        }
    </script>
</body>
</html>
